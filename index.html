<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>PixelWall 200</title>
  <style>
    body {
      background:#111;
      color:white;
      font-family:Arial;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      margin-top:20px;
    }
    #wall { border:2px solid #444; image-rendering: pixelated; }
  </style>
</head>
<body>
  <h1>PixelWall 200</h1>
  <p>Pozostało pikseli: <span id="left">200</span></p>
  <input type="color" id="color" value="#00e5ff">
  <canvas id="wall" width="500" height="500"></canvas>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <script>
  // TWÓJ CONFIG — działa w HTML
  const firebaseConfig = {
    apiKey: "AIzaSyCJGBWaQGhkQ0rCj_DXsfp5d3cnuH7rk14",
    authDomain: "pygame-14987.firebaseapp.com",
    projectId: "pygame-14987",
    storageBucket: "pygame-14987.firebasestorage.app",
    messagingSenderId: "186030203687",
    appId: "1:186030203687:web:e649b7dae014a3a437ff02",
    measurementId: "G-TGQY3FYPS1",
    databaseURL: "https://pygame-14987-default-rtdb.europe-west1.firebasedatabase.app"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const c = document.getElementById("wall");
  const ctx = c.getContext("2d");
  const size = 10;
  const leftSpan = document.getElementById("left");
  const colorInput = document.getElementById("color");

  // limit na przeglądarkę (200 pikseli)
  let used = Number(localStorage.getItem("pixel_used") || 0);
  const LIMIT = 200;
  updateLeft();

  // siatka
  function drawGrid() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,c.width,c.height);
    ctx.strokeStyle = "#222";
    for (let x = 0; x < c.width; x += size) {
      for (let y = 0; y < c.height; y += size) {
        ctx.strokeRect(x,y,size,size);
      }
    }
  }
  drawGrid();

  // nasłuchiwanie zmian z Firebase
  db.ref("pixels").on("value", snap => {
    const data = snap.val() || {};
    drawGrid();
    Object.keys(data).forEach(key => {
      const p = data[key];
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, size, size);
    });
  });

  // klik maluje piksel
  c.addEventListener("click", e => {
    if (used >= LIMIT) {
      alert("Wykorzystałeś limit 200 pikseli.");
      return;
    }
    const rect = c.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) / size) * size;
    const y = Math.floor((e.clientY - rect.top) / size) * size;
    const color = colorInput.value;

    const key = `${x}_${y}`;
    db.ref("pixels/" + key).set({ x, y, color });

    used++;
    localStorage.setItem("pixel_used", used);
    updateLeft();
  });

  function updateLeft() {
    leftSpan.textContent = Math.max(0, LIMIT - used);
  }
  </script>
</body>
</html>
