<canvas id="wall" width="600" height="600" style="border:3px solid #888; image-rendering: pixelated;"></canvas>

<script>
const c = document.getElementById("wall");
const ctx = c.getContext("2d");

const size = 20; // DUŻE piksele
let used = Number(localStorage.getItem("pixel_used") || 0);
const LIMIT = 200;

function drawGrid() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.strokeStyle = "#333"; // jaśniejsza siatka
  for (let x = 0; x < c.width; x += size) {
    for (let y = 0; y < c.height; y += size) {
      ctx.strokeRect(x, y, size, size);
    }
  }
}
drawGrid();

// Firebase listener
db.ref("pixels").on("value", snap => {
  const data = snap.val() || {};
  drawGrid();
  Object.keys(data).forEach(key => {
    const p = data[key];
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, size, size);
  });
});

// klik = malowanie
c.addEventListener("click", e => {
  if (used >= LIMIT) return alert("Limit 200 pikseli!");

  const rect = c.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / size) * size;
  const y = Math.floor((e.clientY - rect.top) / size) * size;
  const color = document.getElementById("color").value;

  const key = `${x}_${y}`;
  db.ref("pixels/" + key).set({ x, y, color });

  used++;
  localStorage.setItem("pixel_used", used);
});
</script>
